name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - name: Update npm (trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm test
      - name: Publish to npm (OIDC trusted publishing, with provenance)
        run: npm publish
