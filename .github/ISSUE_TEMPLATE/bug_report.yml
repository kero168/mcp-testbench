name: Bug report
description: Something broke or behaved unexpectedly
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: mcp-testbench version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: OS and Node.js version
      placeholder: "Windows 11 / Node 22.x"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Exact command you ran
      render: shell
      placeholder: npx mcp-testbench run --server "npx -y @modelcontextprotocol/server-everything"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected vs. what happened
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: mcptest.config.yaml (if used)
      render: yaml
  - type: textarea
    id: logs
    attributes:
      label: Full output / logs
      render: shell
